# CI (ubuntu-latest=16GB): Gradle JVM heap'i düşük tut — release AAB'de yanında
# ayrı Kotlin daemon + gen_snapshot (Dart AOT, native, Xmx dışı) çalışır; 8G heap
# + native süreçler 16GB'ı aşınca runner iptal eder (exit 143 "operation canceled").
org.gradle.jvmargs=-Xmx5G -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
