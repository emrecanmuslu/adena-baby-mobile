name: iOS release (TestFlight)

# App Store Connect API key ile CLOUD (otomatik) imzalı .ipa üretir ve
# doğrudan TestFlight'a yükler. Mac GEREKMEZ (macos-15 runner derler+imzalar).
#
# Gerekli GitHub Secrets:
#   APP_STORE_CONNECT_API_KEY_ID      — API anahtarının Key ID'si
#   APP_STORE_CONNECT_API_ISSUER_ID   — App Store Connect Issuer ID (UUID)
#   APP_STORE_CONNECT_API_KEY_BASE64  — AuthKey_*.p8 dosyasının base64'ü (tek satır)
#
# Tetik: elle (Run workflow) veya `ios-v*` tag push (örn. git tag ios-v1.2.0).
on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: 'API taban adresi'
        required: true
        default: 'https://api.adenababy.com/api/v1'
  push:
    tags: ['ios-v*']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TEAM_ID: '76279KR37M'

jobs:
  build-ios:
    # Apple App Store Connect ARTIK iOS 26 SDK (Xcode 26+) ZORUNLU tutuyor;
    # macos-15 (Xcode 16, iOS 18.5 SDK) yüklemede "SDK version issue" verir.
    # macos-26 = Xcode 26 (iOS 26 SDK). (Firebase Swift 6 zaten Xcode 16+ ister.)
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Varsayılan Xcode 26 değilse, kurulu en yüksek Xcode'u seç (iOS 26 SDK için).
      - name: Xcode 26 seç
        run: |
          ls /Applications | grep -i '^Xcode' || true
          LATEST=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$LATEST" ]; then sudo xcode-select -s "$LATEST/Contents/Developer"; fi
          xcodebuild -version

      - name: Flutter kur
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.1'

      - name: Sürüm
        run: flutter --version

      # Firebase SPM manifest'leri CI'da bozuk → CocoaPods kullan, SPM kapalı kalsın.
      # pub get'ten ÖNCE çalışmalı.
      - name: SPM kapat (CocoaPods kullan)
        run: flutter config --no-enable-swift-package-manager

      - name: Bağımlılıklar
        run: flutter pub get

      - name: Codegen (drift)
        run: dart run build_runner build --delete-conflicting-outputs

      # TestFlight build numarası benzersiz + monoton artmalı; sürüm adı pubspec'ten.
      - name: Build numarası + sürüm adı
        id: vc
        run: |
          echo "code=$(( ${{ github.run_number }} + 100 ))" >> "$GITHUB_OUTPUT"
          NAME=$(grep '^version:' pubspec.yaml | sed -E 's/version: *([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      # Xcode projesini + Pods'u hazırla (derleme archive adımında olur).
      # dart-define'lar Generated.xcconfig'e yazılır; archive bunları kullanır.
      - name: iOS yapılandırması (config-only)
        run: >
          flutter build ios --release --config-only --no-codesign
          --dart-define-from-file=dart_defines.json
          --dart-define=API_BASE_URL=${{ github.event.inputs.api_base_url || 'https://api.adenababy.com/api/v1' }}
          --build-number=${{ steps.vc.outputs.code }}

      - name: CocoaPods kur
        working-directory: ios
        run: pod install

      # Secret'larda sonda kalmış whitespace/newline 401'e yol açar
      # (-authenticationKeyID "5N8...\n" geçersiz). Trimleyip env'e yaz.
      - name: API key kimliklerini temizle
        env:
          RAW_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          RAW_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          echo "ASC_KEY_ID=$(printf '%s' "$RAW_KEY_ID" | tr -d '[:space:]')" >> "$GITHUB_ENV"
          echo "ASC_ISSUER_ID=$(printf '%s' "$RAW_ISSUER_ID" | tr -d '[:space:]')" >> "$GITHUB_ENV"

      # API key'i geleneksel konuma + AuthKey_<KeyID>.p8 adıyla yaz
      # (xcodebuild cloud imzalama servisi anahtarı yalnız orada arar).
      - name: API key yaz
        env:
          KEY_B64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          echo "$KEY_B64" | base64 -d > "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"

      # Cloud imzalama her CI run'ında YENİ development+distribution sertifikası
      # üretir → bireysel hesabın cert limiti dolunca archive "maximum number of
      # certificates" ile patlar. Archive'dan ÖNCE API ile üretilmiş eski
      # sertifikaları temizle ki hep yer olsun (hepsi ephemeral, yeniden üretilir).
      - name: Eski sertifikaları temizle (cert limiti)
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          ASC_KEY_B64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          python3 -m pip install --quiet --break-system-packages pyjwt cryptography requests || python3 -m pip install --quiet pyjwt cryptography requests
          # Best-effort: geçici ASC API hatası build'i düşürmesin (limit doluysa archive zaten uyarır).
          python3 scripts/asc_certs.py --revoke-all || echo "::warning::cert temizlik atlandı (gecici ASC API hatasi)"

      # Cloud imzalı archive: -allowProvisioningUpdates + API key ile sertifika
      # ve profiller (Runner + FeedWidgetExtension) otomatik oluşturulur.
      - name: Archive (cloud imzalı)
        run: >
          xcodebuild
          -quiet
          -workspace ios/Runner.xcworkspace
          -scheme Runner
          -configuration Release
          -archivePath "$RUNNER_TEMP/Runner.xcarchive"
          -destination 'generic/platform=iOS'
          -allowProvisioningUpdates
          -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          -authenticationKeyID "$ASC_KEY_ID"
          -authenticationKeyIssuerID "$ASC_ISSUER_ID"
          DEVELOPMENT_TEAM="$TEAM_ID"
          CODE_SIGN_STYLE=Automatic
          MARKETING_VERSION=${{ steps.vc.outputs.name }}
          CURRENT_PROJECT_VERSION=${{ steps.vc.outputs.code }}
          archive

      # Export + TestFlight yükleme (ExportOptions.plist destination=upload).
      - name: Export + TestFlight'a yükle
        run: >
          xcodebuild
          -quiet
          -exportArchive
          -archivePath "$RUNNER_TEMP/Runner.xcarchive"
          -exportPath "$RUNNER_TEMP/ipa"
          -exportOptionsPlist ios/ExportOptions.plist
          -allowProvisioningUpdates
          -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          -authenticationKeyID "$ASC_KEY_ID"
          -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: IPA'yı artifact olarak sakla
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: AdenaBaby-ipa
          path: ${{ runner.temp }}/ipa/*.ipa
          if-no-files-found: warn
