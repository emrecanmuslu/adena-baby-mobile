name: iOS build (imzasız ipa)

# Sideloadly ile yan-yükleme için imzasız .ipa üretir.
# Actions sekmesi → "Run workflow" → (varsayılan cloud adresi hazır) → bitince artifact'ı indir.
on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: 'API taban adresi (test sunucusu)'
        required: true
        default: 'https://api.adenababy.com/api/v1'

# Tüm JS aksiyonlarını Node 24'te çalıştır (checkout/upload-artifact Node 20 uyarısını susturur).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-ios:
    # Firebase SDK Swift 6 'sending' anahtar kelimesini kullanır → Xcode 16+ (Swift 6)
    # şart. macos-14 = Xcode 15.4 (Swift 5) → derleme hatası. macos-15 = Xcode 16.
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Flutter kur
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.1'

      - name: Sürüm
        run: flutter --version

      # Firebase SPM manifest'leri CI'da bozuk (SourcePackages rsync / firebase_sdk_version.rb
      # fileNotFound). Proje CocoaPods'a döndürüldü (pbxproj'tan SPM ref'leri çıkarıldı),
      # SPM'i kapalı tut ki yeniden migrate etmesin. pub get'ten ÖNCE çalışmalı.
      - name: SPM kapat (CocoaPods kullan)
        run: flutter config --no-enable-swift-package-manager

      - name: Bağımlılıklar
        run: flutter pub get

      - name: Codegen (drift)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: iOS derle (imzasız)
        run: >
          flutter build ios --release --no-codesign
          --dart-define=API_BASE_URL=${{ inputs.api_base_url }}

      - name: .ipa paketle
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -R Runner.app Payload/Runner.app
          zip -qq -r AdenaBaby.ipa Payload

      - name: Artifact yükle
        uses: actions/upload-artifact@v4
        with:
          name: AdenaBaby-ipa
          path: build/ios/iphoneos/AdenaBaby.ipa
          if-no-files-found: error
